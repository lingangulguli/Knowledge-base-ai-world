<header class="header"><div class="header-inner"><div class="header-left"><a href="../index.html" class="logo"><div class="logo-icon">AI</div>AI 专区 <span class="sep">· 游戏知识库</span></a><nav><a href="articles.html" class="active">文章</a><a href="skills.html">Skill Hub</a><a href="tools.html">工具墙</a></nav></div><div class="header-right"><button class="search-trigger"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="6" cy="6" r="4.5"/><path d="M13 13l-3-3"/></svg>搜索…<kbd>⌘K</kbd></button></div></div></header>

<div class="page-hero fade-up"><h1>全部 AI 文章</h1><p>汇集近 3 个月内知识库中的 AI 相关文章</p></div>
<div class="page-controls fade-up d1">
  <div class="type-switcher" id="pageTypeSwitcher">
    <button class="type-btn active" onclick="filterAll('全部',this)">📑 全部</button>
    <button class="type-btn" onclick="filterAll('团队经验',this)">🏢 团队经验</button>
    <button class="type-btn" onclick="filterAll('个人沉淀',this)">✍️ 个人沉淀</button>
  </div>
  <div style="display:flex;gap:10px"><input class="page-search" placeholder="搜索文章…" id="articleSearch" oninput="filterAll(null,null)"><select class="page-sort"><option>按时间排序</option><option>按热度排序</option></select></div>
</div>

<div class="section page-content fade-up d2" style="padding-top:0"><div class="category-pills" id="pagePills" style="margin-bottom:20px"></div><div class="articles-grid" id="allArticles"></div><div class="pagination" id="articlePagination"></div></div>

<footer class="footer"><span>© 2026 游戏知识库 · AI 专区</span><div class="footer-links"><a href="https://gameinstitute.qq.com/" target="_blank">关于我们</a><a href="https://wj.qq.com/s2/26026989/0c20" target="_blank">反馈建议</a><a href="https://gameinstitute.qq.com/" target="_blank">帮助文档</a></div></footer>
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div><div class="detail-panel" id="detailPanel"><div class="panel-header"><button class="panel-fav" onclick="alert('已收藏')">♡</button><button class="panel-close" onclick="closePanel()">✕</button></div><div class="panel-body" id="panelBody"></div></div>
<script src="../js/main.js"></script>
<script>
const PER_PAGE=9; let currentPage=1; let filtered=ARTICLES; let currentType='全部';
renderCategoryPills(CATEGORIES,'pagePills');
function filterAll(type,btn){
  if(type!==null)currentType=type;
  if(btn){document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
  const q=(document.getElementById('articleSearch').value||'').toLowerCase();
  const activePill=document.querySelector('.category-pills .pill.active');
  const cat=activePill?activePill.dataset.cat:'全部';
  filtered=ARTICLES.filter(a=>{
    const mt=currentType==='全部'||a.type===currentType;
    const mq=!q||a.title.toLowerCase().includes(q)||a.desc.toLowerCase().includes(q);
    const mc=cat==='全部'||a.category===cat;
    return mt&&mq&&mc;
  });
  currentPage=1;renderPage(1);
}
function renderPage(page){currentPage=page;const s=(page-1)*PER_PAGE;document.getElementById('allArticles').innerHTML=filtered.slice(s,s+PER_PAGE).map(a=>renderArticleCard(a,false)).join('');renderPagination('articlePagination',filtered.length,PER_PAGE,page,'renderPage');}
setTimeout(()=>{document.querySelectorAll('.category-pills .pill').forEach(p=>{p.addEventListener('click',()=>setTimeout(()=>filterAll(null,null),10));});},50);
renderPage(1);
</script></body></html>
