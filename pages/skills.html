<script src="../js/main.js"></script>
<script>
const PER_PAGE=8; let currentPage=1; let filtered=SKILLS;
renderCategoryPills(CATEGORIES,'skillPagePills');

function filterSkills(){
  const q=(document.getElementById('skillSearch').value||'').toLowerCase();
  const activePill=document.querySelector('.category-pills .pill.active');
  const cat=activePill?activePill.dataset.cat:'全部';
  filtered=SKILLS.filter(s=>{
    const matchQ=!q||s.name.toLowerCase().includes(q)||s.desc.toLowerCase().includes(q);
    const matchCat=cat==='全部'||s.category===cat;
    return matchQ&&matchCat;
  });
  currentPage=1; renderPage(1);
}
function renderPage(page){
  currentPage=page;
  const start=(page-1)*PER_PAGE,end=start+PER_PAGE;
  document.getElementById('allSkills').innerHTML=filtered.slice(start,end).map(s=>renderSkillCard(s)).join('');
  renderPagination('skillPagination',filtered.length,PER_PAGE,page,'renderPage');
}
setTimeout(()=>{document.querySelectorAll('.category-pills .pill').forEach(p=>{p.addEventListener('click',()=>setTimeout(filterSkills,10));});},50);
renderPage(1);
</script></body></html>
