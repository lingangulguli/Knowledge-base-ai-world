<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>搜索结果 · AI 专区</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../css/style.css">
<style>
.search-page-bar{max-width:var(--max-w);margin:0 auto;padding:32px 32px 0;display:flex;gap:12px;align-items:center}
.search-page-input{flex:1;padding:12px 18px;border-radius:var(--radius-md);border:1px solid var(--border);font-size:15px;font-family:var(--font-cn);outline:none;background:var(--surface);transition:border-color var(--t)}.search-page-input:focus{border-color:var(--accent)}
.search-page-btn{padding:12px 24px;border-radius:var(--radius-md);background:var(--accent);color:#fff;font-size:14px;font-weight:600;transition:background var(--t)}.search-page-btn:hover{background:var(--accent-hover)}
.search-summary{max-width:var(--max-w);margin:0 auto;padding:20px 32px 0;font-size:14px;color:var(--text-secondary)}
.search-summary strong{color:var(--text-primary)}
.result-section-title{font-size:16px;font-weight:600;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:8px}
.result-section-title .count{font-size:13px;font-weight:500;color:var(--text-tertiary)}
.result-section{margin-bottom:32px}
</style>
</head><body>
<header class="header"><div class="header-inner"><div class="header-left"><a href="../index.html" class="logo"><div class="logo-icon">AI</div>AI 专区 <span class="sep">· 游戏知识库</span></a><nav><a href="articles.html">文章</a><a href="skills.html">Skill Hub</a><a href="tools.html">工具墙</a></nav></div><div class="header-right"><button class="search-trigger"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="6" cy="6" r="4.5"/><path d="M13 13l-3-3"/></svg>搜索…<kbd>⌘K</kbd></button></div></div></header>

<div class="search-page-bar">
  <input type="text" class="search-page-input" id="searchInput" placeholder="搜索文章、技能、工具…" autofocus>
  <button class="search-page-btn" onclick="doPageSearch()">搜索</button>
</div>
<div class="search-summary" id="searchSummary"></div>

<div class="section" id="searchResults" style="padding-top:24px"></div>

<footer class="footer"><span>© 2026 游戏知识库 · AI 专区</span><div class="footer-links"><a href="https://gameinstitute.qq.com/" target="_blank">关于我们</a><a href="https://wj.qq.com/s2/26026989/0c20" target="_blank">反馈建议</a><a href="https://gameinstitute.qq.com/" target="_blank">帮助文档</a></div></footer>
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div><div class="detail-panel" id="detailPanel"><div class="panel-header"><button class="panel-fav" onclick="alert('已收藏')">♡</button><button class="panel-close" onclick="closePanel()">✕</button></div><div class="panel-body" id="panelBody"></div></div>

<script src="../js/main.js"></script>
<script>
const input=document.getElementById('searchInput');
const params=new URLSearchParams(window.location.search);
if(params.get('q')){input.value=params.get('q');doPageSearch();}

input.addEventListener('keydown',e=>{if(e.key==='Enter')doPageSearch();});

function doPageSearch(){
  const q=input.value.trim();
  if(!q){document.getElementById('searchResults').innerHTML='';document.getElementById('searchSummary').innerHTML='';return;}
  const r=globalSearch(q);
  const total=r.articles.length+r.skills.length+r.tools.length;
  document.getElementById('searchSummary').innerHTML=total?`找到 <strong>${total}</strong> 条与 "<strong>${q}</strong>" 相关的结果`:`未找到与 "<strong>${q}</strong>" 相关的结果`;

  let h='';
  if(r.articles.length){
    h+=`<div class="result-section"><div class="result-section-title">📄 文章 <span class="count">(${r.articles.length})</span></div><div class="articles-grid">${r.articles.map(a=>renderArticleCard(a,false)).join('')}</div></div>`;
  }
  if(r.skills.length){
    h+=`<div class="result-section"><div class="result-section-title">⚡ Skills <span class="count">(${r.skills.length})</span></div><div class="skills-grid">${r.skills.map(s=>renderSkillCard(s)).join('')}</div></div>`;
  }
  if(r.tools.length){
    h+=`<div class="result-section"><div class="result-section-title">🔧 工具 <span class="count">(${r.tools.length})</span></div><div class="tools-grid">${r.tools.map(t=>renderToolCard(t)).join('')}</div></div>`;
  }
  document.getElementById('searchResults').innerHTML=h;
  // Update URL
  window.history.replaceState(null,'','search.html?q='+encodeURIComponent(q));
}
</script></body></html>
